<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>uapi API reference</title>
<meta name="description" content="Complete OpenAPI 3.1 reference for uapi - the native HTTP REST API for OpenWrt.">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="../style.css">
<style>
  /* Redoc's middle content area renders with a hard-coded white background in
     the bundled CSS; the theme schema does not expose it. Force-match the
     site's dark palette here so the article doesn't end up as a white slab
     between the dark sidebar and right panel. */
  redoc { display: block; background-color: #1a1d24; color: #d4d4d4; }
  redoc h1, redoc h2, redoc h3, redoc h4, redoc h5 { color: #ffffff; }
  redoc table thead { background-color: #21242c; color: #d4d4d4; }
  redoc table tbody tr { background-color: #1a1d24; }
  /* The big "Download OpenAPI specification" CTA in Redoc's intro is white
     by default; tone it to the brand. */
  redoc a[download] { background: #ff6600; color: #000; border: none; }
</style>
</head>
<body>

<div class="topbar">
  <a href="../" class="brand">uapi</a>
  <span class="crumb">/ API reference</span>
  <nav>
    <a href="../">Home</a>
    <a href="../install/">Install</a>
    <a href="openapi.json">openapi.json</a>
    <a href="https://github.com/openwrt-iac/uapi">GitHub</a>
  </nav>
</div>

<redoc id="redoc"></redoc>

<!-- Pinned to redoc@2.5.3 with an SRI hash so the browser refuses to execute
     any byte stream other than the one we verified. To upgrade: download
     https://cdn.jsdelivr.net/npm/redoc@<new>/bundles/redoc.standalone.js,
     recompute the sha384 SRI, replace both version and integrity below. -->
<script src="https://cdn.jsdelivr.net/npm/redoc@2.5.3/bundles/redoc.standalone.js"
        integrity="sha384-xiEssMQFSpSfLbzRZCGfxxIM5QDb2DTrU6vyoZdp2sV1L6pmOMy6MpTtUoLbpC96"
        crossorigin="anonymous"></script>

<script>
  // Dark theme derived from web/style.css's palette. Redoc's HTTP-method
  // and response-status colors are kept distinct (status colors are a
  // contract with the reader: green = 2xx, yellow = redirect, etc.) but
  // shifted toward the higher-saturation variants that read well on dark.
  Redoc.init("openapi.json", {
    expandResponses: "200,201,204,207",
    jsonSampleExpandLevel: 2,
    schemaExpansionLevel: 1,
    pathInMiddlePanel: true,
    requiredPropsFirst: true,
    sortPropsAlphabetically: true,
    hideLoading: true,
    theme: {
      colors: {
        primary: { main: "#ff6600" },
        text: {
          primary: "#d4d4d4",
          secondary: "#8a8f99",
        },
        border: {
          dark: "#2d313b",
          light: "#21242c",
        },
        gray: {
          50: "#21242c",
          100: "#2d313b",
        },
        http: {
          get:     "#3aa0ff",
          post:    "#5dc560",
          put:     "#ffa940",
          patch:   "#b48cff",
          delete:  "#ff5c5c",
          head:    "#9aa6b2",
          options: "#22cfd0",
        },
        responses: {
          success:  { color: "#5dc560", backgroundColor: "rgba(93,197,96,0.08)" },
          error:    { color: "#ff5c5c", backgroundColor: "rgba(255,92,92,0.08)" },
          redirect: { color: "#ffa940", backgroundColor: "rgba(255,169,64,0.08)" },
          info:     { color: "#3aa0ff", backgroundColor: "rgba(58,160,255,0.08)" },
        },
      },
      typography: {
        // API docs are heavy on headings (every endpoint + section is one);
        // serif breaks visual rhythm with the sans-serif body. Keep both as
        // the same system stack. The landing page can stay Georgia-serif for
        // its prose hero.
        fontFamily: "-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif",
        headings: {
          fontFamily: "-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif",
          fontWeight: "600",
          color: "#ffffff",
        },
        code: {
          fontFamily: "SFMono-Regular, Menlo, Consolas, monospace",
          color: "#ff8533",
          backgroundColor: "#12141a",
        },
        links: {
          color: "#ff6600",
          hover: "#ff8533",
        },
      },
      sidebar: {
        backgroundColor: "#12141a",
        textColor: "#d4d4d4",
        activeTextColor: "#ff6600",
      },
      rightPanel: {
        backgroundColor: "#12141a",
        textColor: "#d4d4d4",
      },
      schema: {
        nestedBackground: "#21242c",
        linesColor: "#2d313b",
        typeNameColor: "#ff8533",
        typeTitleColor: "#ff6600",
        requireLabelColor: "#ff5c5c",
      },
      codeBlock: {
        backgroundColor: "#12141a",
      },
    },
  }, document.getElementById("redoc"));
</script>

</body>
</html>
